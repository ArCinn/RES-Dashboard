<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RES-Dashboard</title>
</head>
<body>
    <h1>Temp Website, go away ^_^ (3)</h1>
    <div style="width: 800px;"><canvas id="myChart"></canvas></div>
    <script type="module">
        import Chart from 'https://cdn.jsdelivr.net/npm/chart.js/auto/auto.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Notice I added 'collection', 'addDoc', and 'serverTimestamp' here!
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOpg3gV-_gwAhvh2Blwr3awMPln7yG2ys",
            authDomain: "res-database-efcbe.firebaseapp.com",
            projectId: "res-database-efcbe",
            storageBucket: "res-database-efcbe.firebasestorage.app",
            messagingSenderId: "402511038798",
            appId: "1:402511038798:web:4697300d8224dae57b361f",
            measurementId: "G-JH4927MGX0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        console.log("Firebase is linked to my GitHub site! 🚀");

        // --- SEEDING FUNCTION ---
        async function seedDummyData() {
            const devices = [
                "DeviceLow1", "DeviceLow2", "DeviceLow3",
                "DeviceMed1", "DeviceMed2", "DeviceMed3",
                "DeviceHi1", "DeviceHi2", "DeviceHi3",
                "DeviceControl"
            ];

            console.log("Starting to plant dummy data... 🌱");

            for (const deviceId of devices) {
                // This tells Firebase to go to: devices > [Name] > readings
                const readingsRef = collection(db, "devices", deviceId, "readings");
                
                for (let i = 0; i < 5; i++) { // Let's start with 5 each to be safe
                    await addDoc(readingsRef, {
                        temperature: parseFloat((Math.random() * (30 - 18) + 18).toFixed(1)),
                        humidity: parseFloat((Math.random() * (60 - 30) + 30).toFixed(1)),
                        co2: Math.floor(Math.random() * (1200 - 400) + 400),
                        timestamp: serverTimestamp()
                    });
                }
                console.log(`Finished seeding ${deviceId}`);
            }
            alert("Database seeded! Check your Firestore Console. 🎉");
        }

        // --- GRAPH FUNCTION ---
        async function buildDeviceChart(deviceId) {
            // 1. Get the data from Firestore, ordered by time
            const readingsRef = collection(db, "devices", deviceId, "readings");
            const q = query(readingsRef, orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);

            const labels = [];
            const tempData = [];
            const co2Data = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // Convert the Firebase timestamp to a readable time
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "";
                
                labels.push(time);
                tempData.push(data.temperature);
                co2Data.push(data.co2);
            });

            // 2. Create the Chart
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Temperature (°C) - ${deviceId}`,
                        data: tempData,
                        borderColor: 'rgb(255, 99, 132)',
                        tension: 0.1
                    },
                    {
                        label: `CO2 (ppm) - ${deviceId}`,
                        data: co2Data,
                        borderColor: 'rgb(54, 162, 235)',
                        tension: 0.1
                    }]
                }
            });
        }

        // --- EXECUTION SECTION ---
        buildDeviceChart("DeviceHi1");
        // seedDummyData(); 
        // getGreeting(); 
    </script>
</body>
</html>
