        // --- GRAPH FUNCTION ---
        async function buildDeviceChart(deviceId) {
            const readingsRef = collection(db, "devices", deviceId, "readings");
            const q = query(readingsRef, orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);

            const labels = [];
            const tempData = [];
            const humidityData = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // Convert Firebase timestamp to readable Clock Time
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "Pending...";
                
                labels.push(time);
                tempData.push(data.temperature);
                humidityData.push(data.humidity);
            });

            const ctx = document.getElementById('myChart');
            
            // This 'Chart' comes from the <script src="..."> tag we added above
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperature (°C)',
                            data: tempData,
                            borderColor: 'red',
                            backgroundColor: 'rgba(255, 0, 0, 0.1)',
                            yAxisID: 'y',
                        },
                        {
                            label: 'Humidity (%)',
                            data: humidityData,
                            borderColor: 'blue',
                            backgroundColor: 'rgba(0, 0, 255, 0.1)',
                            yAxisID: 'y1',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { type: 'linear', display: true, position: 'left' },
                        y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });
        }

        // --- EXECUTION SECTION ---
        buildDeviceChart("DeviceHi1");
