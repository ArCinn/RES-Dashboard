    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        
        // Notice I added 'collection', 'addDoc', and 'serverTimestamp' here!
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOpg3gV-_gwAhvh2Blwr3awMPln7yG2ys",
            authDomain: "res-database-efcbe.firebaseapp.com",
            projectId: "res-database-efcbe",
            storageBucket: "res-database-efcbe.firebasestorage.app",
            messagingSenderId: "402511038798",
            appId: "1:402511038798:web:4697300d8224dae57b361f",
            measurementId: "G-JH4927MGX0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        console.log("Firebase is linked to my GitHub site! 🚀");

        // --- SEEDING FUNCTION START ---
        async function seedDummyData() {
            const devices = [
                "DeviceLow1", "DeviceLow2", "DeviceLow3",
                "DeviceMed1", "DeviceMed2", "DeviceMed3",
                "DeviceHi1", "DeviceHi2", "DeviceHi3",
                "DeviceControl"
            ];

            console.log("Starting to plant dummy data... 🌱");

            for (const deviceId of devices) {
                // This tells Firebase to go to: devices > [Name] > readings
                const readingsRef = collection(db, "devices", deviceId, "readings");
                
                for (let i = 0; i < 5; i++) { // Let's start with 5 each to be safe
                    await addDoc(readingsRef, {
                        temperature: parseFloat((Math.random() * (30 - 18) + 18).toFixed(1)),
                        humidity: parseFloat((Math.random() * (60 - 30) + 30).toFixed(1)),
                        co2: Math.floor(Math.random() * (1200 - 400) + 400),
                        timestamp: serverTimestamp()
                    });
                }
                console.log(`Finished seeding ${deviceId}`);
            }
            alert("Database seeded! Check your Firestore Console. 🎉");
        }

        // --- EXECUTION ---
        
        // STEP 1: Uncomment the line below, save, and visit your site once.
        seedDummyData();

    </script>
